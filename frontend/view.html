<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WishDrop — A Wish For You 💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --rose:#e63070; --rose-light:#fff0f3; --rose-mid:#ffccd5; --rose-dark:#c9184a; --dark:#1a0a10; --muted:#9a7080; --cream:#fffaf8; --border:#f0e4e8; }
    body { background: var(--cream); font-family: 'DM Sans', sans-serif; }

    /* Loading */
    .loader {
      position: fixed; inset: 0; background: var(--cream);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 1000; gap: 1rem;
    }
    .loader-logo { font-family: 'Yeseva One', serif; font-size: 2rem; color: var(--rose); }
    .spinner { width: 28px; height: 28px; border: 3px solid var(--rose-mid); border-top-color: var(--rose); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Expired state */
    .expired-state {
      display: none; min-height: 100vh;
      flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
    }
    .expired-icon { font-size: 3rem; margin-bottom: 1rem; }
    .expired-title { font-family: 'Yeseva One', serif; font-size: 1.8rem; color: var(--dark); margin-bottom: 0.5rem; }
    .expired-sub { font-size: 14px; color: var(--muted); font-weight: 300; }

    /* Watermark */
    .watermark {
      position: fixed; bottom: 1rem; right: 1.25rem;
      font-size: 11px; color: var(--muted); z-index: 999;
      opacity: 0.6; letter-spacing: 0.05em;
    }
    .watermark span { color: var(--rose); font-weight: 500; }

    /* PDF bar */
    .pdf-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 998;
      background: white; border-top: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: none; align-items: center; justify-content: space-between;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.08); flex-wrap: wrap; gap: 0.5rem;
    }
    .pdf-bar-text { font-size: 13px; color: var(--muted); font-weight: 300; }
    .pdf-bar-text strong { color: var(--dark); font-weight: 500; }
    .pdf-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--rose); color: white;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500;
      padding: 0.6rem 1.4rem; border-radius: 50px; border: none;
      cursor: pointer; transition: all 0.2s;
    }
    .pdf-btn:hover { background: var(--rose-dark); }
    .pdf-btn svg { width: 14px; height: 14px; }

    /* Wish page content injected here */
    #wishContent { padding-bottom: 70px; }
  </style>
</head>
<body>

  <!-- Loader -->
  <div class="loader" id="loader">
    <div class="loader-logo">WishDrop</div>
    <div class="spinner"></div>
  </div>

  <!-- Expired state -->
  <div class="expired-state" id="expiredState">
    <div class="expired-icon">⏳</div>
    <div class="expired-title">This wish has expired</div>
    <p class="expired-sub">Wish pages are only active for 2 days.<br/>If you want to save it, ask him to recreate it on WishDrop.</p>
  </div>

  <!-- Watermark -->
  <div class="watermark">made with <span>WishDrop</span></div>

  <!-- PDF download bar (shown after page loads) -->
  <div class="pdf-bar" id="pdfBar">
    <p class="pdf-bar-text"><strong>Save this page forever</strong> — Download as a beautiful PDF for ₹10</p>
    <button class="pdf-btn" id="pdfBtn" onclick="initiatePdfDownload()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download PDF — ₹10
    </button>
  </div>

  <!-- Wish content rendered here -->
  <div id="wishContent"></div>

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script>
    const API_BASE = `${window.location.origin}/api`;
    let wishData = null;
    let shareToken = null;

    window.addEventListener('DOMContentLoaded', async () => {
      const params = new URLSearchParams(window.location.search);
      shareToken   = params.get('token');

      if (!shareToken) {
        showExpired(); return;
      }

      try {
        const res = await fetch(`${API_BASE}/share/${shareToken}`);
        const data = await res.json();

        if (!res.ok || data.error) { showExpired(); return; }

        wishData = data.wish;
        renderWish(wishData);
        document.getElementById('loader').style.display = 'none';

        // Show PDF bar if not already paid
        if (!wishData.pdfPaid) {
          setTimeout(() => {
            document.getElementById('pdfBar').style.display = 'flex';
          }, 3000);
        }

      } catch (e) {
        showExpired();
      }
    });

    function showExpired() {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('expiredState').style.display = 'flex';
    }

    // ── RENDER ──
    // Injects the wish data directly into the correct template structure
    function renderWish(wish) {
      const content = document.getElementById('wishContent');

      // Pick the right template iframe
      const templateMap = {
        1: 'wishdrop-template.html',
        2: 'wishdrop-template-2.html',
        3: 'wishdrop-template-3.html'
      };

      // We render as full iframe with data passed via URL params
      // The template reads from the share API, not localStorage
      // This keeps it simple and secure
      const params = new URLSearchParams({ token: shareToken, view: 'true' });
      const iframe  = document.createElement('iframe');
      iframe.src    = `${templateMap[wish.templateNo]}?${params.toString()}`;
      iframe.style.cssText = 'width:100%; height:100vh; border:none;';
      iframe.allow  = 'autoplay';
      content.appendChild(iframe);
    }

    // ── PDF DOWNLOAD ──
    async function initiatePdfDownload() {
      const btn = document.getElementById('pdfBtn');
      btn.textContent = 'Loading...'; btn.disabled = true;

      try {
        // Check if already paid
        if (wishData.pdfPaid) {
          downloadPdf(); return;
        }

        const order = await fetch(`${API_BASE}/share/${shareToken}/pdf-payment`, { method: 'POST' });
        const data  = await order.json();

        if (data.alreadyPaid) { downloadPdf(); return; }

        // Open Razorpay
        const payment = await new Promise((resolve, reject) => {
          const rzp = new Razorpay({
            key:         data.keyId,
            amount:      data.amount,
            currency:    data.currency,
            name:        'WishDrop',
            description: 'Download your wish page as PDF',
            order_id:    data.orderId,
            theme:       { color: '#e63070' },
            handler:     resolve,
            modal:       { ondismiss: () => reject(new Error('cancelled')) }
          });
          rzp.open();
        });

        // Verify
        const verify = await fetch(`${API_BASE}/share/${shareToken}/pdf-verify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...payment, wishId: data.wishId })
        });
        const result = await verify.json();

        if (result.success) {
          document.getElementById('pdfBar').style.display = 'none';
          downloadPdf();
        }
      } catch (e) {
        btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download PDF — ₹10`;
        btn.disabled = false;
      }
    }

    async function downloadPdf() {
      // Load html2canvas + jsPDF and capture
      const script1 = document.createElement('script');
      script1.src   = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      document.head.appendChild(script1);

      script1.onload = async () => {
        const script2 = document.createElement('script');
        script2.src   = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        document.head.appendChild(script2);

        script2.onload = async () => {
          const btn = document.getElementById('pdfBtn');
          if (btn) { btn.textContent = 'Preparing PDF...'; btn.disabled = true; }

          // Disable animations
          document.body.classList.add('pdf-mode');

          const canvas = await html2canvas(document.getElementById('wishContent'), {
            scale: 2, useCORS: true, allowTaint: true
          });

          document.body.classList.remove('pdf-mode');

          const { jsPDF } = window.jspdf;
          const pdf  = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
          const imgW = 210;
          const imgH = (canvas.height * imgW) / canvas.width;

          pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, imgW, imgH);
          pdf.save(`wishdrop-${wishData.gfName}-wish.pdf`);

          if (btn) { btn.textContent = 'Downloaded ✓'; }
        };
      };
    }
  </script>

  <style>
    /* PDF mode — disable all animations */
    .pdf-mode *, .pdf-mode *::before, .pdf-mode *::after {
      animation: none !important;
      transition: none !important;
    }
    .pdf-mode .petals, .pdf-mode .stars, .pdf-mode .bubbles { display: none !important; }
  </style>
</body>
</html>
